{% extends "city/base.html" %}
{% load static %}

{% block title %}Create Review | CityRate{% endblock %}

{% block content %}

<section class="form-page">
    <div class="form-card">
        <h1>Create Review</h1>
        <p class="form-subtitle">Share your travel experience with other users.</p>

        <form method="post" class="styled-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Post Review</button>
        </form>

        <p class="back-link">
            <a href="{% url 'review_list' %}">← View all reviews</a>
        </p>
    </div>
</section>

{% endblock %}
