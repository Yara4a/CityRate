<!DOCTYPE html>
<html>
<head>
    <title>Delete Review</title>
</head>
<body>

<h1>Delete Review</h1>

<p>Are you sure you want to delete this review?</p>

<p>{{ post.review_text }}</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Delete</button>
</form>

<p>
    <a href="{% url 'review_list' %}">Cancel</a>
</p>

</body>
</html>
