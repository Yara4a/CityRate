{% extends "city/base.html" %}
{% load static %}

{% block title %}Delete Review | CityRate{% endblock %}

{% block content %}

<section class="form-page">

    <div class="form-card">

        <h1>Delete Review</h1>

        <p class="form-subtitle">
            Are you sure you want to delete this review?
        </p>

        <div class="review-preview">
            <p>{{ post.review_text }}</p>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="delete-actions">

                <button type="submit" class="btn btn-delete">
                    Delete Review
                </button>

                <a href="{% url 'review_list' %}" class="btn btn-secondary">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</section>

{% endblock %}
