{% extends "city/base.html" %}

{% block title %}Login | CityRate{% endblock %}

{% block content %}

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap');

  .form-page {
    min-height: 100vh;
    background: #f5f5e8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 2rem;
    box-sizing: border-box;
    position: relative;
    overflow: hidden;
  }

  .form-page::before {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: #1a5c1a;
    opacity: 0.06;
    top: -120px; left: -100px;
    pointer-events: none;
  }

  .form-page::after {
    content: '';
    position: absolute;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: #1a5c1a;
    opacity: 0.06;
    bottom: -60px; right: -60px;
    pointer-events: none;
  }

  .form-card {
    background: #fff;
    border-radius: 20px;
    padding: 3rem 2.5rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 4px 40px rgba(26, 92, 26, 0.10);
    position: relative;
    z-index: 1;
  }

  .form-card::before {
    content: '';
    height: 4px;
    background: #e8e8b0;
    position: absolute;
    top: 0; left: 2.5rem; right: 2.5rem;
    border-radius: 0 0 8px 8px;
  }

  .form-card h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    color: #1a5c1a;
    margin: 0 0 0.4rem;
  }

  .form-subtitle {
    font-size: 0.9rem;
    color: #888;
    margin: 0 0 2rem;
  }

  .styled-form p { margin-bottom: 1.2rem; }

  .styled-form label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: #444;
    margin-bottom: 0.4rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .styled-form input[type="text"],
  .styled-form input[type="email"],
  .styled-form input[type="password"] {
    width: 100%;
    box-sizing: border-box;
    padding: 0.75rem 1rem;
    border: 1.5px solid #e0e0d0;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: #222;
    background: #fafaf4;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .styled-form input[type="text"]:focus,
  .styled-form input[type="email"]:focus,
  .styled-form input[type="password"]:focus {
    border-color: #1a5c1a;
    background: #fff;
  }

  .btn.btn-primary {
    width: 100%;
    padding: 0.85rem;
    background: #1a5c1a;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.01em;
  }

  .btn.btn-primary:hover { background: #144a14; }
  .btn.btn-primary:active { transform: scale(0.99); }

  .back-link {
    text-align: center;
    font-size: 0.88rem;
    color: #888;
    margin-top: 1.5rem;
  }

  .back-link a {
    color: #1a5c1a;
    font-weight: 500;
    text-decoration: none;
  }

  .back-link a:hover { text-decoration: underline; }
</style>
<section class="form-page">
    <div class="form-card">
        <h1>Login</h1>
        <p class="form-subtitle">Welcome back! Please enter your details.</p>

        <form method="post" class="styled-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <p class="back-link">
            New to CityRate? <a href="{% url 'signup' %}">Sign up here</a>
        </p>
    </div>
</section>
{% endblock %}
