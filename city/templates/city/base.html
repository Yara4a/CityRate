{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CityRate{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f5f5e8;
        }

        .navbar {
            background: #fff;
            border-bottom: 1px solid #e8e8d8;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            flex-shrink: 0;
        }

        .logo img {
            height: 36px;
            width: 36px;
            object-fit: cover;
            border-radius: 8px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .nav-links a {
            font-size: 0.9rem;
            font-weight: 500;
            color: #444;
            text-decoration: none;
            padding: 0.45rem 0.85rem;
            border-radius: 8px;
            transition: background 0.15s, color 0.15s;
        }

        .nav-links a:hover {
            background: #f0f0e4;
            color: #1a5c1a;
        }

        .nav-user {
            font-size: 0.88rem !important;
            color: #1a5c1a !important;
            background: #eef5ee !important;
            border-radius: 20px !important;
            padding: 0.4rem 1rem !important;
        }

        .nav-user:hover {
            background: #dceadc !important;
        }

        .nav-button {
            background: #1a5c1a !important;
            color: #fff !important;
            border-radius: 8px !important;
            padding: 0.45rem 1rem !important;
            font-size: 0.9rem !important;
        }

        .nav-button:hover {
            background: #144a14 !important;
            color: #fff !important;
        }

        .site-footer {
            text-align: centre;
            padding: 2rem;
            font-size: 0.85rem;
            color: #aaa;
            border-top: 1px solid #e8e8d8;
            background: #fff;
            margin-top: 4rem;
        }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="nav-container">

        <a href="{% url 'home' %}" class="logo">
            <img src="{% static 'images/logo.jpeg' %}" alt="CityRate logo">
        </a>

        <div class="nav-links">
            <a href="{% url 'review_list' %}">Reviews</a>
            <a href="{% url 'create_post' %}">Create Post</a>

            {% if user.is_authenticated %}
                <a href="{% url 'account_page' %}" class="nav-user">
                    Hi, {{ user.username }}
                </a>
            {% else %}
                <a href="{% url 'login' %}" class="nav-button">
                    Login
                </a>
            {% endif %}
        </div>

    </div>
</nav>

<main class="page-container">
    {% block content %}
    {% endblock %}
</main>

<footer class="site-footer">
    <p>© 2026 CityRate – Share your travel experiences</p>
</footer>

<script src="{% static 'js/main.js' %}"></script>

</body>
</html>
